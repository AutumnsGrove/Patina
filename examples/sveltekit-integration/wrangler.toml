name = "foliage-integration-example"
compatibility_date = "2024-01-01"

# D1 Database Binding
# Stores metadata for custom fonts and community themes
# Access in your routes via: const { DB } = platform.env
[[d1_databases]]
binding = "DB"
database_name = "foliage-db"
database_id = "your-database-id-here"  # TODO: Replace with your D1 database ID from `wrangler d1 list`

# R2 Bucket Binding
# Stores actual font files (WOFF2 format) and theme thumbnails
# Access in your routes via: const { R2 } = platform.env
[[r2_buckets]]
binding = "R2"
bucket_name = "foliage-fonts"
preview_bucket_name = "foliage-fonts-preview"  # Optional: separate bucket for local development with `wrangler dev`
